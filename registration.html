<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
	<title>ReDefiners - Registration</title>
								<!-- --- Bootstrap 5 --- -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl" crossorigin="anonymous">
								<!-- --- Font Awesome --- -->
	<script src="https://kit.fontawesome.com/7a13c96681.js" crossorigin="anonymous"></script>
								<!-- --- jQuery --- -->
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
								<!-- --- Text Font --- -->
	<link rel="preconnect" href="https://fonts.gstatic.com">
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
								<!-- --- Tailwind CSS (CDN + config) --- -->
	<script src="https://cdn.tailwindcss.com"></script>
	<script src="css/tailwind-config.js?v=3"></script>
								<!-- --- Custom Css --- -->
	<link rel="stylesheet" type="text/css" href="css/tokens.css?v=3">
	<link rel="stylesheet" type="text/css" href="css/shadcn.css?v=3">
	<link rel="stylesheet" type="text/css" href="styles.css?v=3">
</head>
<body class="tw-font-poppins">
	<div class="tw-flex tw-flex-col md:tw-flex-row tw-min-h-screen">
		<!-- Left Panel — Teal Branding -->
		<div class="tw-hidden md:tw-flex tw-w-1/2 tw-bg-gradient-to-b tw-from-primary-700 tw-to-primary-800 tw-flex-col tw-items-center tw-justify-center tw-p-10 tw-gap-6" style="border-radius: 0 40px 0 0;">
			<h1 class="tw-text-white tw-font-bold tw-text-display tw-text-center">
				Join Us
			</h1>
			<h1 class="tw-text-primary-400 tw-font-bold tw-text-h1 tw-text-center">
				Start Learning Today
			</h1>
			<h5 class="tw-text-primary-400 tw-font-normal tw-text-body tw-text-center">
				Create your account and unlock access to
				<br>
				world-class language education
			</h5>
			<div class="tw-flex tw-gap-4 tw-mt-6">
				<img src="Images/login1.png">
				<img src="Images/login2.png">
				<img src="Images/login3.png">
				<img src="Images/login4.png">
			</div>
		</div>

		<!-- Right Panel — Registration Form -->
		<div class="tw-flex tw-flex-1 tw-items-center tw-justify-center tw-p-6 md:tw-p-12">
			<div class="tw-w-full tw-max-w-sm">
				<img src="Images/logo.png" class="tw-mb-6 tw-h-10">

				<h2 class="tw-text-h3 tw-font-semibold tw-text-primary-900 tw-mb-1">Create Your Account</h2>
				<p class="tw-text-body-sm tw-text-primary-400 tw-mb-6">Fill in your details to get started</p>

				<form class="tw-space-y-4">
					<div class="tw-space-y-1.5">
						<label class="tw-text-body-sm tw-font-medium tw-text-primary-900">
							Full Name
						</label>
						<input type="text" name="fullname" class="shadcn-input" placeholder="Enter your full name">
					</div>
					<div class="tw-space-y-1.5">
						<label class="tw-text-body-sm tw-font-medium tw-text-primary-900">
							Email Address
						</label>
						<input type="email" name="email" class="shadcn-input" placeholder="you@example.com">
					</div>
					<div class="tw-space-y-1.5">
						<label class="tw-text-body-sm tw-font-medium tw-text-primary-900">
							Password
						</label>
						<input type="password" name="password" class="shadcn-input" placeholder="Create a strong password">
					</div>
					<div class="tw-space-y-1.5">
						<label class="tw-text-body-sm tw-font-medium tw-text-primary-900">
							Confirm Password
						</label>
						<input type="password" name="confirm_password" class="shadcn-input" placeholder="Re-enter your password">
					</div>
					<div class="tw-space-y-1.5">
						<label class="tw-text-body-sm tw-font-medium tw-text-primary-900">
							Role
						</label>
						<select name="role" class="shadcn-select">
							<option value="" disabled selected>Select your role</option>
							<option value="student">Student</option>
							<option value="teacher">Teacher</option>
							<option value="parent">Parent</option>
						</select>
					</div>
					<div class="tw-flex tw-items-start tw-gap-2 tw-text-body-sm">
						<input id="terms" type="checkbox" name="terms" class="tw-rounded tw-mt-0.5">
						<label class="tw-text-primary-400" for="terms">
							I agree to the <a href="terms-of-service.html" class="tw-text-primary-900 tw-font-semibold hover:tw-underline">Terms of Service</a> and <a href="#" class="tw-text-primary-900 tw-font-semibold hover:tw-underline">Privacy Policy</a>
						</label>
					</div>
					<a href="dashboard.html" class="shadcn-btn shadcn-btn-primary tw-w-full tw-h-11 tw-text-center tw-font-semibold tw-text-body" style="text-decoration:none;">
						Register
					</a>
				</form>

				<div class="tw-flex tw-items-center tw-gap-3 tw-my-4">
					<div class="tw-flex-1 tw-h-px tw-bg-surface-300"></div>
					<span class="tw-text-caption tw-text-primary-400 tw-font-semibold">OR</span>
					<div class="tw-flex-1 tw-h-px tw-bg-surface-300"></div>
				</div>

				<button class="shadcn-btn shadcn-btn-secondary tw-w-full tw-gap-2">
					<i class="fa fa-google"></i>
					Sign Up With Google
				</button>

				<p class="tw-text-caption tw-text-center tw-mt-6 tw-text-primary-400">
					Already have an account? <a href="login.html" class="tw-text-primary-900 tw-font-semibold hover:tw-underline">Login</a>
				</p>
			</div>
		</div>
	</div>

	<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.3/umd/popper.min.js" integrity="sha384-vFJXuSJphROIrBnz7yo7oB41mKfc8JzQZiCq4NCceLEaO4IHwicKwpJf9c9IpFgh" crossorigin="anonymous"></script>
	<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0-beta.2/js/bootstrap.min.js" integrity="sha384-alpBpkh1PFOepccYVYDB4do5UnbKysX5WZXm3XxPqe5iKTfUKjNkCk9SaVuEZflJ" crossorigin="anonymous"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/0.100.2/js/materialize.min.js"></script>
	<script>
		$(".button-collapse").sideNav();
	</script>
	<script src="js/router.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
	<script src="js/render.js"></script>
	<script src="js/sidebar.js"></script>
<script src="js/app.js"></script>
</body>
</html>
