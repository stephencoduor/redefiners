<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
	<title>ReDefiners - OTP Login</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl" crossorigin="anonymous">
	<script src="https://cdn.tailwindcss.com"></script>
	<script src="css/tailwind-config.js?v=3"></script>
	<script src="https://kit.fontawesome.com/7a13c96681.js" crossorigin="anonymous"></script>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
	<link rel="preconnect" href="https://fonts.gstatic.com">
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" type="text/css" href="css/tokens.css?v=3">
	<link rel="stylesheet" type="text/css" href="css/shadcn.css?v=3">
	<link rel="stylesheet" type="text/css" href="styles.css?v=3">
</head>
<body class="tw-font-poppins">
	<div class="tw-flex tw-flex-col md:tw-flex-row tw-min-h-screen">
		<!-- Left Panel -->
		<div class="tw-hidden md:tw-flex tw-w-1/2 tw-bg-gradient-to-b tw-from-primary-700 tw-to-primary-800 tw-flex-col tw-items-center tw-justify-center tw-p-10 tw-gap-6" style="border-radius: 0 40px 0 0;">
			<h1 class="tw-text-white tw-font-bold tw-text-display tw-text-center">Verify Your Identity</h1>
			<h1 class="tw-text-primary-400 tw-font-bold tw-text-h1 tw-text-center">One-Time Password</h1>
			<h5 class="tw-text-primary-400 tw-font-normal tw-text-body tw-text-center">
				We sent a 6-digit code to your registered
				<br>
				email or phone number
			</h5>
			<div class="tw-flex tw-gap-4 tw-mt-6">
				<img src="Images/login1.png">
				<img src="Images/login2.png">
				<img src="Images/login3.png">
				<img src="Images/login4.png">
			</div>
		</div>

		<!-- Right Panel — OTP Form -->
		<div class="tw-flex tw-flex-1 tw-items-center tw-justify-center tw-p-6 md:tw-p-12">
			<div class="tw-w-full tw-max-w-sm">
				<img src="Images/logo.png" class="tw-mb-6 tw-h-10">

				<h2 class="tw-text-h3 tw-font-semibold tw-text-primary-900 tw-mb-1">Enter Verification Code</h2>
				<p class="tw-text-body-sm tw-text-primary-400 tw-mb-6">A 6-digit code was sent to j***n@email.com</p>

				<form class="tw-space-y-5">
					<!-- OTP Input -->
					<div class="tw-space-y-2">
						<label class="tw-text-body-sm tw-font-medium tw-text-primary-900">Verification Code</label>
						<div class="tw-flex tw-gap-2 tw-justify-between">
							<input type="text" maxlength="1" class="shadcn-input tw-w-12 tw-h-12 tw-text-center tw-text-xl tw-font-bold" placeholder="-">
							<input type="text" maxlength="1" class="shadcn-input tw-w-12 tw-h-12 tw-text-center tw-text-xl tw-font-bold" placeholder="-">
							<input type="text" maxlength="1" class="shadcn-input tw-w-12 tw-h-12 tw-text-center tw-text-xl tw-font-bold" placeholder="-">
							<input type="text" maxlength="1" class="shadcn-input tw-w-12 tw-h-12 tw-text-center tw-text-xl tw-font-bold" placeholder="-">
							<input type="text" maxlength="1" class="shadcn-input tw-w-12 tw-h-12 tw-text-center tw-text-xl tw-font-bold" placeholder="-">
							<input type="text" maxlength="1" class="shadcn-input tw-w-12 tw-h-12 tw-text-center tw-text-xl tw-font-bold" placeholder="-">
						</div>
					</div>

					<!-- Timer -->
					<div class="tw-flex tw-items-center tw-justify-center tw-gap-2 tw-text-sm">
						<i class="fa fa-clock tw-text-primary-400"></i>
						<span class="tw-text-primary-400">Code expires in</span>
						<span class="tw-font-semibold theme-color">04:32</span>
					</div>

					<!-- Verify Button -->
					<a href="dashboard.html" class="shadcn-btn shadcn-btn-primary tw-w-full tw-h-11 tw-text-center tw-font-semibold tw-text-body" style="text-decoration:none;">
						<i class="fa fa-shield-check tw-mr-2"></i> Verify Code
					</a>

					<!-- Resend -->
					<div class="tw-text-center tw-text-sm tw-text-primary-400">
						Didn't receive the code?
						<a href="#" class="tw-font-semibold tw-text-primary-900 hover:tw-underline tw-ml-1">Resend Code</a>
					</div>

					<div class="tw-flex tw-items-center tw-gap-3 tw-my-2">
						<div class="tw-flex-1 tw-h-px tw-bg-surface-300"></div>
						<span class="tw-text-caption tw-text-primary-400 tw-font-semibold">OR</span>
						<div class="tw-flex-1 tw-h-px tw-bg-surface-300"></div>
					</div>

					<!-- Backup Codes -->
					<button type="button" class="shadcn-btn shadcn-btn-secondary tw-w-full tw-gap-2">
						<i class="fa fa-key"></i>
						Use Backup Code Instead
					</button>
				</form>

				<p class="tw-text-caption tw-text-center tw-mt-6 tw-text-primary-400">
					<a href="login.html" class="tw-text-primary-900 tw-font-semibold hover:tw-underline"><i class="fa fa-arrow-left tw-mr-1"></i> Back to Login</a>
				</p>
			</div>
		</div>
	</div>
	<script src="js/sidebar.js"></script>
<script src="js/router.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/render.js"></script>
<script src="js/app.js"></script>
</body>
</html>
