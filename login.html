<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0,  shrink-to-fit=no">
	<title>ReDefiners - Login</title>
									<!-- --- Bootstrap 5 --- -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl" crossorigin="anonymous">
									<!-- --- Font Awesome --- -->
	<script src="https://kit.fontawesome.com/7a13c96681.js" crossorigin="anonymous"></script>
									<!-- --- jQuery --- -->
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
									<!-- --- Text Font --- -->
	<link rel="preconnect" href="https://fonts.gstatic.com">
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
									<!-- --- Custom Css --- -->
	<link rel="stylesheet" type="text/css" href="css/tokens.css">
	<link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
	<div class="row log" style="height: 100vh">
		<div class="col-md-6 res-hide" style="padding: 0;">
				<div class="login-left">
					<h1 style="color: white;font-weight: bold;font-size: 5rem;text-align: center;padding-top:  20px;">
						Welcome
					</h1>
					<h1 style="color: grey;font-weight: bold;font-size: 2rem;text-align: center;padding-bottom:   20px;">
						Bienvenidos
					</h1>
					<h5 style="color: grey;font-weight: normal;font-size: 1rem;text-align: center;padding-bottom:   50px;">
						Enter  your details to login or 
						<br>
						take a <a href="#" style="color: grey;">Placement Test</a>
					</h5>
					<div style="text-align: center;">
						<img src="Images/login1.png">
						<img src="Images/login2.png">
						<img src="Images/login3.png">
						<img src="Images/login4.png">
					</div>
				</div>
		</div>
		<div class="col-md-6" style="padding: 0">
			<div class="login-desc">
				<div style="text-align: left;">
					<img src="Images/logo.png">
				</div>
				<form>
					<div style="text-align: left;">
						<label class="second-color" style="margin-bottom: 4px;">
							Your E-mail
						</label>
						<br>
						<input type="email" name="email">
					</div>
					<div style="text-align: left;">
						<label class="second-color" style="margin-bottom: 4px;">
							Password
						</label>
						<br>
						<input type="password" name="email">
					</div>
					<div style="text-align: left;">
						<input id="check" type="checkbox" name="">
						<label class="second-color" for="check">
							keep me logged in
						</label>
					</div>
					<a href="dashboard.html" style="text-decoration: none;">
						login
					</a>
				</form>
				<h5 class="second-color" style="text-align: center;font-size: 18px;margin: 0;font-weight: bold;">
					OR
				</h5>
				<div class="google">
					<i class="fa fa-google" style="margin-left: 10px "></i>
					Login With Google
				</div>
				<h5 style="font-size: 12px;line-height: 1.4">
					Don't have an account? <span><a href="#" style="text-decoration: none;" class="second-color">Sign up</a></span>
					<br>
					<a href="#" style="text-decoration: none;font-weight: bold;" class="second-color">Forgot Password</a>
				</h5>
			</div>
		</div>
	</div>
</body>
</html>
